<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; frame-src 'self' data: about:" />
  <title>Email Signature Studio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">✒️</span>
      <div>
        <h1>Email Signature Studio</h1>
        <p class="tag">Pay once. Own it forever.</p>
      </div>
    </div>
    <div class="profilebar">
      <label for="profileSelect">Profile</label>
      <select id="profileSelect"></select>
      <button id="btnNewProfile" class="ghost" title="New profile">＋ New</button>
      <button id="btnDuplicate" class="ghost" title="Duplicate profile">⧉ Duplicate</button>
      <button id="btnDelete" class="ghost danger" title="Delete profile">🗑 Delete</button>
      <span class="sep"></span>
      <button id="btnImportCsv" class="ghost" title="Import a CSV of team members">📄 Import CSV</button>
      <button id="btnBatchExport" class="ghost" title="Export every profile as an .html file">📦 Export All</button>
    </div>
  </header>

  <main class="layout">
    <!-- ============================= editor form -->
    <section class="panel form-panel" id="formPanel">
      <details open class="group">
        <summary>Details</summary>
        <div class="fields">
          <label>Full name <input id="f_name" type="text" placeholder="Jane Cooper" /></label>
          <label>Job title <input id="f_title" type="text" placeholder="Head of Growth" /></label>
          <label>Company <input id="f_company" type="text" placeholder="Acme Inc." /></label>
          <div class="row2">
            <label>Phone <input id="f_phone" type="text" placeholder="+1 555 010 0100" /></label>
            <label>Phone 2 / mobile <input id="f_phone2" type="text" placeholder="+1 555 010 0200" /></label>
          </div>
          <label>Email <input id="f_email" type="text" placeholder="jane@acme.com" /></label>
          <label>Website <input id="f_website" type="text" placeholder="acme.com" /></label>
          <label>Address <input id="f_address" type="text" placeholder="100 Main St, Austin TX" /></label>
        </div>
      </details>

      <details class="group">
        <summary>Headshot / Logo</summary>
        <div class="fields">
          <div class="dropzone" id="photoDrop">
            <img id="photoThumb" class="thumb hidden" alt="" />
            <span id="photoHint">Drop an image here or click to upload<br /><small>Auto-resized &amp; embedded as base64</small></span>
            <input type="file" id="photoFile" accept="image/*" hidden />
          </div>
          <button id="btnClearPhoto" class="ghost small hidden">Remove image</button>
          <label>…or hosted image URL (recommended for best email-client support)
            <input id="f_photoUrl" type="text" placeholder="https://yoursite.com/headshot.jpg" /></label>
        </div>
      </details>

      <details class="group">
        <summary>Social links</summary>
        <div class="fields">
          <div class="row2">
            <label>Icon style
              <select id="f_iconStyle">
                <option value="color">Brand colors</option>
                <option value="mono">Monochrome</option>
              </select>
            </label>
          </div>
          <div id="socialFields"></div>
        </div>
      </details>

      <details class="group">
        <summary>Banner &amp; CTA button</summary>
        <div class="fields">
          <div class="dropzone small-zone" id="bannerDrop">
            <img id="bannerThumb" class="thumb wide hidden" alt="" />
            <span id="bannerHint">Optional banner image (drop / click)</span>
            <input type="file" id="bannerFile" accept="image/*" hidden />
          </div>
          <button id="btnClearBanner" class="ghost small hidden">Remove banner</button>
          <label>…or hosted banner URL <input id="f_bannerUrl" type="text" placeholder="https://yoursite.com/banner.png" /></label>
          <label>Banner click-through link <input id="f_bannerLink" type="text" placeholder="https://yoursite.com/offer" /></label>
          <div class="row2">
            <label>CTA button text <input id="f_ctaText" type="text" placeholder="Book a call" /></label>
            <label>CTA color <input id="f_ctaColor" type="color" value="#2563EB" /></label>
          </div>
          <label>CTA URL <input id="f_ctaUrl" type="text" placeholder="https://cal.com/you" /></label>
        </div>
      </details>

      <details class="group">
        <summary>Disclaimer</summary>
        <div class="fields">
          <label>Legal / confidentiality text
            <textarea id="f_disclaimer" rows="3" placeholder="This email and any attachments are confidential…"></textarea></label>
        </div>
      </details>

      <details open class="group">
        <summary>Template &amp; style</summary>
        <div class="fields">
          <div id="templateGrid" class="template-grid"></div>
          <div class="row2">
            <label>Accent color <input id="f_accentColor" type="color" value="#2563EB" /></label>
          </div>
        </div>
      </details>
    </section>

    <!-- ============================= preview -->
    <section class="panel preview-panel">
      <div class="preview-toolbar">
        <div class="toggle-group" id="widthToggle">
          <button data-w="desktop" class="active">🖥 Desktop</button>
          <button data-w="mobile">📱 Mobile</button>
        </div>
        <div class="toggle-group" id="bgToggle">
          <button data-bg="light" class="active">☀ Light</button>
          <button data-bg="dark">🌙 Dark</button>
        </div>
        <span class="flex-spacer"></span>
        <button id="btnGuides" class="ghost">📚 Install guides</button>
      </div>
      <div class="preview-stage" id="previewStage">
        <iframe id="previewFrame" title="Signature preview" sandbox=""></iframe>
      </div>
      <div class="export-bar">
        <button id="btnCopyRich" class="primary">📋 Copy for Gmail / Outlook</button>
        <button id="btnCopySource">⟨/⟩ Copy HTML source</button>
        <button id="btnSaveHtml">💾 Save .html</button>
      </div>
      <p class="statusline" id="statusLine"></p>
    </section>
  </main>

  <!-- ============================= install guides modal -->
  <div class="modal hidden" id="guidesModal">
    <div class="modal-card">
      <div class="modal-head">
        <h2>Install your signature</h2>
        <button id="btnCloseGuides" class="ghost">✕</button>
      </div>
      <div class="guide-tabs" id="guideTabs"></div>
      <div class="guide-body" id="guideBody"></div>
    </div>
  </div>

  <script src="../src/engine.js"></script>
  <script src="app.js"></script>
</body>
</html>
